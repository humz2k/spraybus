name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Conan
        run: python -m pip install --upgrade "conan>=2,<3"

      - name: Create Conan profile
        run: conan profile detect --force

      - name: Build and test client package
        run: conan create . --build=missing -s compiler.cppstd=23

      - name: Build default artifacts
        run: conan build . --build=missing -s compiler.cppstd=23 -of build/ci-default

      - name: Import Python package
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=python/src:build/ci-default/build/Release/python python -c 'import spraybus; import spraybus._native'
