name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require tag to point at main history
        shell: bash
        run: |
          tag_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          git fetch origin main:refs/remotes/origin/main

          if ! git merge-base --is-ancestor "${tag_commit}" refs/remotes/origin/main; then
            echo "Tag ${GITHUB_REF_NAME} does not point at a commit reachable from main." >&2
            exit 1
          fi

          version="${GITHUB_REF_NAME#v}"
          if [[ -z "${version}" || "${version}" == "${GITHUB_REF_NAME}" ]]; then
            echo "Release tags must be prefixed with v, for example v0.1.0." >&2
            exit 1
          fi

  build-server-release:
    name: Build server and publish GitHub release
    runs-on: ubuntu-latest
    needs: validate-tag
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Conan
        run: python -m pip install --upgrade "conan>=2,<3"

      - name: Create Conan profile
        run: conan profile detect --force

      - name: Build server binary
        run: conan build . --build=missing -s compiler.cppstd=23 -o '&:with_server=True' -o '&:with_apps=True'

      - name: Package release asset
        shell: bash
        run: |
          mkdir -p dist/package
          cp build/Release/main dist/package/spraybus-server
          chmod +x dist/package/spraybus-server

          archive="spraybus-server-${GITHUB_REF_NAME}-linux-x86_64.tar.gz"
          tar -czf "dist/${archive}" -C dist/package spraybus-server
          sha256sum "dist/${archive}" > "dist/${archive}.sha256"

      - name: Create or update GitHub release
        shell: bash
        run: |
          archive="spraybus-server-${GITHUB_REF_NAME}-linux-x86_64.tar.gz"

          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              "dist/${archive}" \
              "dist/${archive}.sha256" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "dist/${archive}" \
              "dist/${archive}.sha256" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "spraybus ${GITHUB_REF_NAME}" \
              --generate-notes \
              --verify-tag
          fi
